name: fahrzeugkunde-test

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fahrzeugkunde
      POSTGRES_PASSWORD: fahrzeugkunde
      POSTGRES_DB: fahrzeugkunde
      PGDATA: /data/pgdata
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fahrzeugkunde"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    container_name: fahrzeugkunde-app-test
    image: ghcr.io/as19git67/fahrzeugkunde:test
    restart: unless-stopped
    ports:
      - "8002:3000"
    labels:
      com.centurylinklabs.watchtower.scope: fahrzeugkundetest
    environment:
      DATABASE_URL: postgres://fahrzeugkunde:fahrzeugkunde@db:5432/fahrzeugkunde
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Backup-Sidecar
  #
  # Erzeugt täglich eine einzige Backup-Datei (DB-Dump + Assets) unter
  # ./backups/ auf dem Host. Retention per BACKUP_RETENTION_DAYS.
  #
  # Restore:
  #   cp ./backups/fahrzeugkunde-20260414T...Z.backup ./backups/restore.backup
  #   docker compose restart app
  # (Details siehe README – Abschnitt "Backup & Restore")
  # -------------------------------------------------------------------------
  backup:
    image: ghcr.io/as19git67/fahrzeugkunde-backup:test
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://fahrzeugkunde:fahrzeugkunde@db:5432/fahrzeugkunde
      BACKUP_DIR: /backups
      ASSETS_DIR: /data/assets
      # Default: alle 24h laufen, 14 Tage aufbewahren
      BACKUP_INTERVAL_SECONDS: "86400"
      BACKUP_RETENTION_DAYS: "14"
      TZ: Europe/Berlin
    volumes:
      # Assets nur lesend – Sidecar darf keine App-Dateien verändern
      - app-data:/data:ro
      # Backups landen im Host-Ordner, werden nicht im Docker-Volume versteckt
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy

  # ── Watchtower (Port 9002 — separater Endpunkt vom Produktions-Watchtower) ───
  watchtower:
    image: containrrr/watchtower
    container_name: fahrzeugkunde-watchtower-test
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_HTTP_API_UPDATE: "true"
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_TOKEN}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCOPE: fahrzeugkundetest
      WATCHTOWER_NO_STARTUP_MESSAGE: "true"
    command: >
      --http-api-periodic-polls
      fahrzeugkunde-app-test
    ports:
      - "9002:8080"

volumes:
  app-data:
    driver: local
    driver_opts:
      device: /mnt/vm/fahrzeugkunde_test/data
      o: bind
      type: none
  backups:
    driver: local
    driver_opts:
      device: /mnt/vm/fahrzeugkunde_test/backups
      o: bind
      type: none
