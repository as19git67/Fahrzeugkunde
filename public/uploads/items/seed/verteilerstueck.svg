<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="das Verteilerstück">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="241" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="244" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Hauptkörper -->
      <path d="M 110 100 L 110 130 L 210 130 L 210 100 Q 210 90 198 90 L 122 90 Q 110 90 110 100 Z" fill="#6aa0ff" />
      <!-- Einlass B unten -->
      <rect x="140" y="130" width="40" height="30" fill="#6aa0ff" />
      <rect x="134" y="156" width="52" height="12" rx="2" fill="#1a1a1a" />
      <!-- Auslass links (C) -->
      <rect x="84" y="94" width="30" height="22" fill="#6aa0ff" />
      <rect x="78" y="88" width="12" height="34" rx="2" fill="#1a1a1a" />
      <!-- Auslass Mitte (B) -->
      <rect x="146" y="62" width="28" height="30" fill="#6aa0ff" />
      <rect x="142" y="52" width="36" height="12" rx="2" fill="#1a1a1a" />
      <!-- Auslass rechts (C) -->
      <rect x="206" y="94" width="30" height="22" fill="#6aa0ff" />
      <rect x="230" y="88" width="12" height="34" rx="2" fill="#1a1a1a" />
      <!-- Drei Absperr-Handräder -->
      <circle cx="100" cy="82" r="7" fill="none" stroke-width="3" />
      <line x1="100" y1="75" x2="100" y2="89" stroke-width="2" />
      <line x1="93" y1="82" x2="107" y2="82" stroke-width="2" />
      <circle cx="160" cy="102" r="8" fill="none" stroke-width="3" />
      <line x1="160" y1="94" x2="160" y2="110" stroke-width="2" />
      <line x1="152" y1="102" x2="168" y2="102" stroke-width="2" />
      <circle cx="220" cy="82" r="7" fill="none" stroke-width="3" />
      <line x1="220" y1="75" x2="220" y2="89" stroke-width="2" />
      <line x1="213" y1="82" x2="227" y2="82" stroke-width="2" />
    </g>
  
  </g>
</svg>
