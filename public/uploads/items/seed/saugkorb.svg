<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Saugkorb">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="148" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="151" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Oberer Anschlussstutzen -->
      <rect x="142" y="56" width="36" height="20" fill="#1a1a1a" />
      <rect x="138" y="76" width="44" height="10" fill="#1a1a1a" />
      <!-- Siebkorb (gerundeter Kegel) -->
      <path d="M 110 86 Q 104 120 130 150 L 190 150 Q 216 120 210 86 Z" fill="#2e8bff" />
      <!-- Gitter: vertikale Striche -->
      <line x1="124" y1="90" x2="134" y2="146" stroke-width="2" />
      <line x1="142" y1="88" x2="146" y2="148" stroke-width="2" />
      <line x1="160" y1="86" x2="160" y2="150" stroke-width="2" />
      <line x1="178" y1="88" x2="174" y2="148" stroke-width="2" />
      <line x1="196" y1="90" x2="186" y2="146" stroke-width="2" />
      <!-- Gitter: horizontale Striche -->
      <path d="M 112 102 Q 160 108 208 102" fill="none" stroke-width="2" />
      <path d="M 108 120 Q 160 128 212 120" fill="none" stroke-width="2" />
      <path d="M 118 138 Q 160 144 202 138" fill="none" stroke-width="2" />
    </g>
  
  </g>
</svg>
