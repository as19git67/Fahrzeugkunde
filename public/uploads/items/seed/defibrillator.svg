<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Defibrillator">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="667" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="670" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Gehäuse -->
      <rect x="100" y="58" width="120" height="110" rx="8" fill="#e05a85" />
      <!-- Display oben -->
      <rect x="114" y="70" width="92" height="32" rx="3" fill="#2a2a2a" />
      <!-- EKG-Linie im Display -->
      <path d="M 118 86 L 134 86 L 142 80 L 150 92 L 158 86 L 202 86" fill="none" stroke="#50ff80" stroke-width="2" />
      <!-- Herz-Blitz Symbol -->
      <path d="M 140 116 Q 130 106 140 124 Q 150 132 160 142 Q 170 132 180 124 Q 190 106 180 116 Q 170 108 160 118 Q 150 108 140 116 Z" fill="#d83a2a" />
      <path d="M 158 120 L 152 132 L 162 132 L 156 144" fill="none" stroke="#ffffff" stroke-width="2.4" />
      <!-- Schock-Taste -->
      <circle cx="160" cy="156" r="10" fill="#f5c330" />
      <!-- Elektroden-Anschlusskabel -->
      <path d="M 220 130 Q 240 146 232 166" fill="none" stroke-width="3" />
    </g>
  
  </g>
</svg>
