<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Saugschlauch">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="957" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="960" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Schlauchkörper (leicht geschwungen) -->
      <path d="M 100 90 Q 160 70 220 130" stroke-width="26" stroke="#2e8bff" fill="none" />
      <path d="M 100 90 Q 160 70 220 130" stroke-width="26" fill="none" />
      <!-- Riffelung (kurze Querstriche entlang des Bogens) -->
      <line x1="110" y1="76" x2="110" y2="96" stroke-width="1.8" />
      <line x1="126" y1="72" x2="126" y2="92" stroke-width="1.8" />
      <line x1="144" y1="70" x2="146" y2="90" stroke-width="1.8" />
      <line x1="162" y1="72" x2="166" y2="92" stroke-width="1.8" />
      <line x1="178" y1="76" x2="184" y2="96" stroke-width="1.8" />
      <line x1="194" y1="84" x2="200" y2="104" stroke-width="1.8" />
      <line x1="206" y1="96" x2="212" y2="114" stroke-width="1.8" />
      <!-- Kupplung links -->
      <rect x="82" y="80" width="24" height="26" rx="2" fill="#1a1a1a" />
      <rect x="76" y="78" width="10" height="30" rx="2" fill="#1a1a1a" />
      <!-- Kupplung rechts -->
      <rect x="214" y="120" width="24" height="26" rx="2" fill="#1a1a1a" transform="rotate(45 226 133)" />
    </g>
  
  </g>
</svg>
