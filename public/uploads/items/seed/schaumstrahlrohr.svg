<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="das Schaumstrahlrohr">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="860" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="863" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Kupplung links -->
      <rect x="80" y="96" width="14" height="28" rx="2" fill="#1a1a1a" />
      <!-- Rohrstück schmal -->
      <rect x="94" y="100" width="30" height="20" fill="#6aa0ff" />
      <!-- Hebel/Absperrung -->
      <rect x="110" y="82" width="8" height="18" fill="#1a1a1a" />
      <!-- Mischkammer (breiter) -->
      <rect x="124" y="92" width="30" height="36" rx="4" fill="#6aa0ff" />
      <!-- Luftansaugöffnungen -->
      <circle cx="136" cy="106" r="3" fill="#1a1a1a" />
      <circle cx="146" cy="106" r="3" fill="#1a1a1a" />
      <circle cx="136" cy="118" r="3" fill="#1a1a1a" />
      <circle cx="146" cy="118" r="3" fill="#1a1a1a" />
      <!-- Konus nach rechts -->
      <path d="M 154 92 L 220 70 L 220 150 L 154 128 Z" fill="#6aa0ff" />
      <!-- Sprühmuster / Schaum-Blasen -->
      <circle cx="230" cy="80" r="6" fill="none" stroke-width="2.4" />
      <circle cx="240" cy="96" r="5" fill="none" stroke-width="2.4" />
      <circle cx="244" cy="116" r="7" fill="none" stroke-width="2.4" />
      <circle cx="234" cy="136" r="5" fill="none" stroke-width="2.4" />
    </g>
  
  </g>
</svg>
