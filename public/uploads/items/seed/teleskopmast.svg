<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Teleskopmast">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="784" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="787" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Fußplatte -->
      <rect x="120" y="152" width="80" height="12" rx="2" fill="#1a1a1a" />
      <!-- Basis-Segment -->
      <rect x="142" y="124" width="36" height="32" fill="#f5c330" />
      <!-- Mitte-Segment -->
      <rect x="148" y="96" width="24" height="32" fill="#f5c330" />
      <!-- Top-Segment -->
      <rect x="153" y="72" width="14" height="28" fill="#f5c330" />
      <!-- Scheinwerferkopf (quer) -->
      <rect x="110" y="58" width="100" height="18" rx="3" fill="#1a1a1a" />
      <rect x="116" y="62" width="88" height="10" fill="#ffffff" />
      <line x1="138" y1="62" x2="138" y2="72" stroke-width="1.4" />
      <line x1="160" y1="62" x2="160" y2="72" stroke-width="1.4" />
      <line x1="182" y1="62" x2="182" y2="72" stroke-width="1.4" />
      <!-- Segmenttrennlinien -->
      <line x1="142" y1="124" x2="178" y2="124" stroke-width="1.6" />
      <line x1="148" y1="96" x2="172" y2="96" stroke-width="1.6" />
    </g>
  
  </g>
</svg>
