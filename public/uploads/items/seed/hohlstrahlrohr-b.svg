<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="das Hohlstrahlrohr B">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="392" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="395" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
      <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
        <!-- Kupplung hinten -->
        <rect x="76" y="86" width="16" height="48" rx="2" fill="#1a1a1a" />
        <!-- Korpus -->
        <rect x="92" y="90" width="70" height="40" rx="6" fill="#2e8bff" />
        <!-- Rändel-Dosierring (Strahl/Sprüh) -->
        <rect x="152" y="86" width="24" height="48" fill="#1a1a1a" />
        <line x1="156" y1="88" x2="156" y2="132" stroke="#f7f1e1" stroke-width="1.4" />
        <line x1="162" y1="88" x2="162" y2="132" stroke="#f7f1e1" stroke-width="1.4" />
        <line x1="168" y1="88" x2="168" y2="132" stroke="#f7f1e1" stroke-width="1.4" />
        <!-- Düsenkopf (konisch) -->
        <path d="M 176 90 L 218 82 L 218 138 L 176 130 Z" fill="#2e8bff" />
        <!-- Pistolengriff unten -->
        <path d="M 118 130 L 132 168 L 154 168 L 140 130 Z" fill="#2e8bff" />
        <!-- Abzug -->
        <rect x="130" y="134" width="14" height="18" rx="3" fill="#1a1a1a" />
      </g>
    
  </g>
</svg>
