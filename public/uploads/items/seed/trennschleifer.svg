<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Trennschleifer">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="668" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="671" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Motor -->
      <rect x="82" y="88" width="60" height="44" rx="6" fill="#b47a30" />
      <!-- Kühlrippen -->
      <line x1="94" y1="88" x2="94" y2="132" stroke-width="1.8" />
      <line x1="104" y1="88" x2="104" y2="132" stroke-width="1.8" />
      <line x1="114" y1="88" x2="114" y2="132" stroke-width="1.8" />
      <!-- Griffbügel oben -->
      <path d="M 100 88 Q 110 68 130 68 Q 136 68 136 88" fill="none" stroke-width="3.5" />
      <!-- Verbindungsarm zur Scheibe -->
      <rect x="142" y="100" width="30" height="20" fill="#b47a30" />
      <!-- Schutzhaube (halbkreis oben) -->
      <path d="M 168 114 Q 170 64 216 76" fill="none" stroke-width="4" />
      <!-- Trennscheibe -->
      <circle cx="200" cy="116" r="36" fill="#d0d0d0" />
      <circle cx="200" cy="116" r="6" fill="#1a1a1a" />
      <circle cx="200" cy="116" r="22" fill="none" stroke-width="1.4" stroke-dasharray="5 5" />
    </g>
  
  </g>
</svg>
