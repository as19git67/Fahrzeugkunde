<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="die Stab-Taschenlampe">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="820" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="823" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Kopfstück (dicker) -->
      <rect x="90" y="94" width="34" height="32" rx="3" fill="#1a1a1a" />
      <!-- Linse vorne -->
      <rect x="82" y="96" width="10" height="28" fill="#ffffff" />
      <!-- Schaft -->
      <rect x="124" y="100" width="86" height="20" fill="#f5c330" />
      <!-- Griff-Riffel -->
      <line x1="140" y1="100" x2="140" y2="120" stroke-width="1.6" />
      <line x1="152" y1="100" x2="152" y2="120" stroke-width="1.6" />
      <line x1="164" y1="100" x2="164" y2="120" stroke-width="1.6" />
      <line x1="176" y1="100" x2="176" y2="120" stroke-width="1.6" />
      <line x1="188" y1="100" x2="188" y2="120" stroke-width="1.6" />
      <!-- Endkappe -->
      <rect x="210" y="98" width="14" height="24" rx="2" fill="#1a1a1a" />
      <!-- Schlaufe -->
      <circle cx="232" cy="110" r="6" fill="none" stroke-width="3" />
      <!-- Lichtstrahlen -->
      <line x1="80" y1="102" x2="70" y2="98" stroke-width="1.6" opacity="0.5" />
      <line x1="78" y1="110" x2="66" y2="110" stroke-width="1.6" opacity="0.5" />
      <line x1="80" y1="118" x2="70" y2="122" stroke-width="1.6" opacity="0.5" />
    </g>
  
  </g>
</svg>
