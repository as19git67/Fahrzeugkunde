<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Schnellangriffsschlauch">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="590" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="593" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Seitenplatten -->
      <rect x="88" y="64" width="14" height="92" rx="3" fill="#d83a2a" />
      <rect x="218" y="64" width="14" height="92" rx="3" fill="#d83a2a" />
      <!-- Bodenschiene -->
      <rect x="80" y="156" width="160" height="12" rx="3" fill="#1a1a1a" />
      <!-- Trommel seitlich -->
      <circle cx="160" cy="110" r="42" fill="#d83a2a" />
      <circle cx="160" cy="110" r="34" fill="#e6d8b8" />
      <circle cx="160" cy="110" r="26" fill="#d83a2a" />
      <circle cx="160" cy="110" r="18" fill="#e6d8b8" />
      <circle cx="160" cy="110" r="10" fill="#d83a2a" />
      <circle cx="160" cy="110" r="4" fill="#1a1a1a" />
      <!-- Kurbel -->
      <line x1="160" y1="110" x2="196" y2="96" stroke-width="4" />
      <circle cx="196" cy="96" r="5" fill="#1a1a1a" />
      <!-- Schlauch heraus mit Strahlrohr -->
      <path d="M 130 148 Q 104 158 92 134" fill="none" stroke-width="8" stroke="#d83a2a" />
      <path d="M 130 148 Q 104 158 92 134" fill="none" stroke-width="8" />
      <!-- Strahlrohr-Spitze -->
      <path d="M 94 138 L 78 120 L 86 114 L 100 130 Z" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
