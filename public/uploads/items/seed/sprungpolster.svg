<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="das Sprungpolster">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="154" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="157" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Unterer Kern (dicker) -->
      <rect x="72" y="100" width="176" height="54" rx="14" fill="#d83a2a" />
      <!-- Oberer Kern (dünner) -->
      <rect x="78" y="74" width="164" height="28" rx="10" fill="#d83a2a" />
      <!-- Zielkreuz obere Mitte -->
      <rect x="152" y="80" width="16" height="60" fill="#ffffff" />
      <rect x="130" y="104" width="60" height="14" fill="#ffffff" />
      <!-- Kantenriffelung -->
      <line x1="78" y1="100" x2="242" y2="100" stroke-width="1.8" />
      <line x1="88" y1="118" x2="232" y2="118" stroke-width="1.4" stroke-dasharray="5 4" />
      <line x1="88" y1="138" x2="232" y2="138" stroke-width="1.4" stroke-dasharray="5 4" />
      <!-- Tragegriffe -->
      <path d="M 68 118 Q 52 126 68 134" fill="none" stroke-width="4" />
      <path d="M 252 118 Q 268 126 252 134" fill="none" stroke-width="4" />
    </g>
  
  </g>
</svg>
