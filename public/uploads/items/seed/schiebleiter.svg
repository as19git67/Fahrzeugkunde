<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="die Schiebleiter">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="975" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="978" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
      <!-- Hauptleiter (unten, lang) -->
      
    <polygon points="70.0,151.0 250.0,151.0 250.0,129.0 70.0,129.0" fill="#78a82f" />
  <line x1="90.0" y1="149.0" x2="90.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="110.0" y1="149.0" x2="110.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="130.0" y1="149.0" x2="130.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="150.0" y1="149.0" x2="150.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="170.0" y1="149.0" x2="170.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="190.0" y1="149.0" x2="190.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="210.0" y1="149.0" x2="210.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="230.0" y1="149.0" x2="230.0" y2="131.0" stroke="#1a1a1a" stroke-width="2.4" />
      <!-- Ausziehteil 1 (versetzt hochgezogen) -->
      
    <polygon points="90.0,123.0 250.0,123.0 250.0,105.0 90.0,105.0" fill="#78a82f" />
  <line x1="110.0" y1="121.0" x2="110.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="130.0" y1="121.0" x2="130.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="150.0" y1="121.0" x2="150.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="170.0" y1="121.0" x2="170.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="190.0" y1="121.0" x2="190.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="210.0" y1="121.0" x2="210.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="230.0" y1="121.0" x2="230.0" y2="107.0" stroke="#1a1a1a" stroke-width="2.4" />
      <!-- Ausziehteil 2 (weiter hochgezogen) -->
      
    <polygon points="110.0,95.0 250.0,95.0 250.0,81.0 110.0,81.0" fill="#78a82f" />
  <line x1="130.0" y1="93.0" x2="130.0" y2="83.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="150.0" y1="93.0" x2="150.0" y2="83.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="170.0" y1="93.0" x2="170.0" y2="83.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="190.0" y1="93.0" x2="190.0" y2="83.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="210.0" y1="93.0" x2="210.0" y2="83.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="230.0" y1="93.0" x2="230.0" y2="83.0" stroke="#1a1a1a" stroke-width="2.4" />
      <!-- Seilzug-Rolle oben rechts -->
      <circle cx="250" cy="80" r="6" fill="#1a1a1a" />
      <!-- Seil -->
      <path d="M 244 80 L 100 146" stroke-width="1.6" />
      <!-- Stützen -->
      <rect x="66" y="130" width="8" height="28" rx="2" fill="#1a1a1a" />
      <rect x="246" y="130" width="8" height="28" rx="2" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
