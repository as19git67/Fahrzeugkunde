<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="die Feuerlöschkreiselpumpe">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="303" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="306" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Sockel -->
      <rect x="90" y="154" width="140" height="14" rx="3" fill="#1a1a1a" />
      <!-- Motor/Getriebeblock -->
      <rect x="190" y="86" width="48" height="68" rx="4" fill="#4a6fbf" />
      <line x1="198" y1="94" x2="198" y2="146" stroke-width="1.8" />
      <line x1="210" y1="94" x2="210" y2="146" stroke-width="1.8" />
      <line x1="222" y1="94" x2="222" y2="146" stroke-width="1.8" />
      <!-- Pumpengehäuse (rund/spiralförmig) -->
      <circle cx="150" cy="120" r="38" fill="#4a6fbf" />
      <circle cx="150" cy="120" r="22" fill="#d0d0d0" />
      <circle cx="150" cy="120" r="6" fill="#1a1a1a" />
      <!-- Laufradspuren -->
      <path d="M 150 114 Q 158 120 150 126 Q 142 120 150 114" fill="none" stroke-width="1.6" />
      <!-- Saugflansch links -->
      <rect x="80" y="104" width="34" height="32" fill="#4a6fbf" />
      <rect x="74" y="98" width="14" height="44" rx="2" fill="#1a1a1a" />
      <!-- Druckabgang oben -->
      <rect x="140" y="66" width="24" height="26" fill="#4a6fbf" />
      <rect x="134" y="56" width="36" height="14" rx="2" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
