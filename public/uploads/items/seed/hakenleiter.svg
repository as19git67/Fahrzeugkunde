<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="die Hakenleiter">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="484" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="487" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
      <!-- Leiter (vertikal) -->
      
    <polygon points="173.0,170.0 173.0,70.0 147.0,70.0 147.0,170.0" fill="#78a82f" />
  <line x1="171.0" y1="155.7" x2="149.0" y2="155.7" stroke="#1a1a1a" stroke-width="2.4" /><line x1="171.0" y1="141.4" x2="149.0" y2="141.4" stroke="#1a1a1a" stroke-width="2.4" /><line x1="171.0" y1="127.1" x2="149.0" y2="127.1" stroke="#1a1a1a" stroke-width="2.4" /><line x1="171.0" y1="112.9" x2="149.0" y2="112.9" stroke="#1a1a1a" stroke-width="2.4" /><line x1="171.0" y1="98.6" x2="149.0" y2="98.6" stroke="#1a1a1a" stroke-width="2.4" /><line x1="171.0" y1="84.3" x2="149.0" y2="84.3" stroke="#1a1a1a" stroke-width="2.4" />
      <!-- Großer Haken oben -->
      <path d="M 148 70 L 148 40 Q 148 28 160 28 Q 196 28 196 64 L 184 64 Q 184 40 160 40 L 160 70 Z" fill="#1a1a1a" />
      <!-- Haken-Dornen (Zähne) -->
      <path d="M 196 52 L 204 48 L 200 58 Z" fill="#1a1a1a" />
      <path d="M 196 60 L 204 62 L 198 66 Z" fill="#1a1a1a" />
      <!-- Fußkappen -->
      <rect x="144" y="168" width="32" height="8" rx="2" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
