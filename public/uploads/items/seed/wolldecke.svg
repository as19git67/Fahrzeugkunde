<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="die Wolldecke">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="132" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="135" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Unterster Falz -->
      <rect x="90" y="140" width="140" height="16" rx="2" fill="#e05a85" />
      <!-- Mittlerer Falz -->
      <rect x="94" y="118" width="132" height="20" rx="2" fill="#e05a85" />
      <!-- Oberer Falz -->
      <rect x="98" y="92" width="124" height="24" rx="3" fill="#e05a85" />
      <!-- Oberste Seite (gefaltet) -->
      <path d="M 102 92 L 120 62 L 200 62 L 218 92 Z" fill="#e05a85" />
      <!-- Querstreifen als Muster -->
      <line x1="104" y1="76" x2="216" y2="76" stroke-width="2" />
      <line x1="98" y1="102" x2="222" y2="102" stroke-width="2" />
      <line x1="94" y1="128" x2="226" y2="128" stroke-width="2" />
      <line x1="90" y1="148" x2="230" y2="148" stroke-width="2" />
      <!-- Textur-Tupfer -->
      <circle cx="130" cy="84" r="1.4" fill="#1a1a1a" />
      <circle cx="170" cy="80" r="1.4" fill="#1a1a1a" />
      <circle cx="150" cy="110" r="1.4" fill="#1a1a1a" />
      <circle cx="192" cy="112" r="1.4" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
