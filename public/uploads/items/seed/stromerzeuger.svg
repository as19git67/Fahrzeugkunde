<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Stromerzeuger">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="978" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="981" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Korpus -->
      <rect x="90" y="90" width="140" height="60" rx="6" fill="#f5c330" />
      <!-- Tankdeckel oben -->
      <rect x="110" y="72" width="100" height="18" rx="4" fill="#f5c330" />
      <circle cx="160" cy="81" r="6" fill="#1a1a1a" />
      <!-- Tragebügel -->
      <path d="M 120 72 Q 160 50 200 72" fill="none" stroke-width="4" />
      <!-- Kühlschlitze -->
      <line x1="104" y1="100" x2="140" y2="100" stroke-width="2" />
      <line x1="104" y1="108" x2="140" y2="108" stroke-width="2" />
      <line x1="104" y1="116" x2="140" y2="116" stroke-width="2" />
      <line x1="104" y1="124" x2="140" y2="124" stroke-width="2" />
      <!-- Steckdosen -->
      <rect x="168" y="100" width="22" height="28" rx="2" fill="#1a1a1a" />
      <circle cx="179" cy="114" r="3" fill="#f5c330" />
      <rect x="198" y="100" width="22" height="28" rx="2" fill="#1a1a1a" />
      <circle cx="209" cy="114" r="3" fill="#f5c330" />
      <!-- Standfüße -->
      <rect x="100" y="150" width="14" height="8" fill="#1a1a1a" />
      <rect x="206" y="150" width="14" height="8" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
