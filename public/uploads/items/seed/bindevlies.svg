<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="das Bindevlies">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="311" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="314" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Rolle (Kern) -->
      <ellipse cx="130" cy="110" rx="42" ry="40" fill="#f2b52f" />
      <!-- Spiral-Ringe -->
      <ellipse cx="130" cy="110" rx="32" ry="30" fill="none" stroke-width="1.6" />
      <ellipse cx="130" cy="110" rx="22" ry="20" fill="none" stroke-width="1.6" />
      <ellipse cx="130" cy="110" rx="12" ry="10" fill="none" stroke-width="1.6" />
      <!-- Kernloch -->
      <ellipse cx="130" cy="110" rx="5" ry="4" fill="#1a1a1a" />
      <!-- Abgerolltes Stück (Fahne) -->
      <path d="M 172 90 L 236 82 L 240 122 L 172 132 Z" fill="#f2b52f" />
      <!-- Textur / Fasern -->
      <line x1="182" y1="96" x2="232" y2="90" stroke-width="1.2" />
      <line x1="182" y1="104" x2="234" y2="100" stroke-width="1.2" />
      <line x1="182" y1="112" x2="236" y2="110" stroke-width="1.2" />
      <line x1="182" y1="120" x2="236" y2="120" stroke-width="1.2" />
    </g>
  
  </g>
</svg>
