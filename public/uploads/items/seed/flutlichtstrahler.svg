<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="der Flutlichtstrahler">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="298" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="301" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
      <!-- Strahlergehäuse -->
      <rect x="110" y="68" width="100" height="40" rx="4" fill="#f5c330" />
      <!-- Reflektor innen -->
      <rect x="118" y="74" width="84" height="28" fill="#ffffff" />
      <line x1="140" y1="74" x2="140" y2="102" stroke-width="1.6" />
      <line x1="160" y1="74" x2="160" y2="102" stroke-width="1.6" />
      <line x1="180" y1="74" x2="180" y2="102" stroke-width="1.6" />
      <!-- Bügel -->
      <path d="M 110 88 L 100 88" stroke-width="3" />
      <path d="M 210 88 L 220 88" stroke-width="3" />
      <!-- Mittelstange -->
      <rect x="156" y="108" width="8" height="40" fill="#1a1a1a" />
      <!-- Stativ (drei Beine) -->
      <path d="M 160 148 L 110 168" stroke-width="4" />
      <path d="M 160 148 L 160 172" stroke-width="4" />
      <path d="M 160 148 L 210 168" stroke-width="4" />
      <!-- Lichtstrahlen -->
      <line x1="124" y1="108" x2="108" y2="120" stroke-width="1.6" opacity="0.5" />
      <line x1="160" y1="108" x2="160" y2="124" stroke-width="1.6" opacity="0.5" />
      <line x1="196" y1="108" x2="212" y2="120" stroke-width="1.6" opacity="0.5" />
    </g>
  
  </g>
</svg>
