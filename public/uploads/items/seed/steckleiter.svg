<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-label="die Steckleiter">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="517" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="520" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <!-- Papier-Hintergrund -->
  <rect width="320" height="220" fill="url(#paper)" />

  <!-- Doppel-Rahmen, leicht verzittert -->
  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="300" height="200" stroke-width="2.4" rx="4" />
    <rect x="15" y="15" width="290" height="190" stroke-width="1.2" rx="3" />
  </g>

  <!-- Pencil-Shading neben der Haupt-Silhouette -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="38" y1="180" x2="78" y2="180" />
    <line x1="38" y1="186" x2="88" y2="186" />
    <line x1="38" y1="192" x2="70" y2="192" />
    <line x1="244" y1="46" x2="282" y2="46" />
    <line x1="244" y1="52" x2="276" y2="52" />
  </g>

  <!-- Haupt-Icon mit Sketch-Filter -->
  <g filter="url(#sketch)">
    
    <g stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
      
    <polygon points="76.0,76.0 244.0,76.0 244.0,60.0 76.0,60.0" fill="#78a82f" />
  <line x1="104.0" y1="74.0" x2="104.0" y2="62.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="132.0" y1="74.0" x2="132.0" y2="62.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="160.0" y1="74.0" x2="160.0" y2="62.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="188.0" y1="74.0" x2="188.0" y2="62.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="216.0" y1="74.0" x2="216.0" y2="62.0" stroke="#1a1a1a" stroke-width="2.4" />
      
    <polygon points="76.0,100.0 244.0,100.0 244.0,84.0 76.0,84.0" fill="#78a82f" />
  <line x1="104.0" y1="98.0" x2="104.0" y2="86.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="132.0" y1="98.0" x2="132.0" y2="86.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="160.0" y1="98.0" x2="160.0" y2="86.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="188.0" y1="98.0" x2="188.0" y2="86.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="216.0" y1="98.0" x2="216.0" y2="86.0" stroke="#1a1a1a" stroke-width="2.4" />
      
    <polygon points="76.0,124.0 244.0,124.0 244.0,108.0 76.0,108.0" fill="#78a82f" />
  <line x1="104.0" y1="122.0" x2="104.0" y2="110.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="132.0" y1="122.0" x2="132.0" y2="110.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="160.0" y1="122.0" x2="160.0" y2="110.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="188.0" y1="122.0" x2="188.0" y2="110.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="216.0" y1="122.0" x2="216.0" y2="110.0" stroke="#1a1a1a" stroke-width="2.4" />
      
    <polygon points="76.0,148.0 244.0,148.0 244.0,132.0 76.0,132.0" fill="#78a82f" />
  <line x1="104.0" y1="146.0" x2="104.0" y2="134.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="132.0" y1="146.0" x2="132.0" y2="134.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="160.0" y1="146.0" x2="160.0" y2="134.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="188.0" y1="146.0" x2="188.0" y2="134.0" stroke="#1a1a1a" stroke-width="2.4" /><line x1="216.0" y1="146.0" x2="216.0" y2="134.0" stroke="#1a1a1a" stroke-width="2.4" />
      <!-- Verbindungsklammern rechts -->
      <rect x="242" y="64" width="8" height="84" rx="2" fill="#1a1a1a" />
      <rect x="70" y="64" width="8" height="84" rx="2" fill="#1a1a1a" />
    </g>
  
  </g>
</svg>
