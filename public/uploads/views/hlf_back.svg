<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="shutterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <linearGradient id="tireGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f0f0f0"/>
  <ellipse cx="400" cy="555" rx="320" ry="20" fill="rgba(0,0,0,0.15)"/>

  <!-- Chassis -->
  <rect x="100" y="470" width="600" height="30" rx="3" fill="#444"/>

  <!-- Aufbau Rückseite -->
  <rect x="100" y="120" width="600" height="360" rx="4" fill="url(#bodyGrad)" stroke="#800" stroke-width="2"/>

  <!-- Reflektierende Streifen (Heck-Markierung) -->
  <rect x="100" y="410" width="600" height="15" fill="#ffcc00" opacity="0.9"/>
  <rect x="100" y="428" width="600" height="10" fill="#fff" opacity="0.6"/>

  <!-- Warnstreifen rot/weiss diagonal -->
  <rect x="100" y="445" width="600" height="25" fill="#cc0000"/>
  <line x1="100" y1="470" x2="130" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="140" y1="470" x2="170" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="180" y1="470" x2="210" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="220" y1="470" x2="250" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="260" y1="470" x2="290" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="300" y1="470" x2="330" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="340" y1="470" x2="370" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="380" y1="470" x2="410" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="420" y1="470" x2="450" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="460" y1="470" x2="490" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="500" y1="470" x2="530" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="540" y1="470" x2="570" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="580" y1="470" x2="610" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="620" y1="470" x2="650" y2="445" stroke="#fff" stroke-width="3"/>
  <line x1="660" y1="470" x2="690" y2="445" stroke="#fff" stroke-width="3"/>

  <!-- Heck-Rollladen GH -->
  <rect x="180" y="150" width="440" height="240" rx="4" fill="url(#shutterGrad)" stroke="#555" stroke-width="2"/>
  <!-- Rollladen-Linien -->
  <line x1="180" y1="170" x2="620" y2="170" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="190" x2="620" y2="190" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="210" x2="620" y2="210" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="230" x2="620" y2="230" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="250" x2="620" y2="250" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="270" x2="620" y2="270" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="290" x2="620" y2="290" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="310" x2="620" y2="310" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="330" x2="620" y2="330" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="350" x2="620" y2="350" stroke="#777" stroke-width="0.7"/>
  <line x1="180" y1="370" x2="620" y2="370" stroke="#777" stroke-width="0.7"/>
  <text x="400" y="143" text-anchor="middle" fill="#fff" font-size="14" font-family="Arial" font-weight="bold">GH</text>

  <!-- Dachkasten -->
  <rect x="100" y="95" width="600" height="28" rx="3" fill="#aa0000" stroke="#800" stroke-width="1"/>

  <!-- Leiter auf Dach (von hinten sichtbar) -->
  <rect x="250" y="80" width="300" height="18" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
  <rect x="280" y="75" width="8" height="25" rx="1" fill="#777"/>
  <rect x="510" y="75" width="8" height="25" rx="1" fill="#777"/>

  <!-- Rückleuchten links -->
  <rect x="110" y="395" width="25" height="40" rx="4" fill="#ff2222" opacity="0.9" stroke="#aa0000" stroke-width="1"/>
  <rect x="110" y="440" width="25" height="25" rx="4" fill="#ffaa00" opacity="0.9" stroke="#cc8800" stroke-width="1"/>

  <!-- Rückleuchten rechts -->
  <rect x="665" y="395" width="25" height="40" rx="4" fill="#ff2222" opacity="0.9" stroke="#aa0000" stroke-width="1"/>
  <rect x="665" y="440" width="25" height="25" rx="4" fill="#ffaa00" opacity="0.9" stroke="#cc8800" stroke-width="1"/>

  <!-- Reifen links -->
  <circle cx="155" cy="510" r="45" fill="url(#tireGrad)"/>
  <circle cx="155" cy="510" r="35" fill="#222"/>
  <circle cx="155" cy="510" r="18" fill="#555"/>
  <circle cx="155" cy="510" r="7" fill="#444"/>

  <!-- Reifen rechts -->
  <circle cx="645" cy="510" r="45" fill="url(#tireGrad)"/>
  <circle cx="645" cy="510" r="35" fill="#222"/>
  <circle cx="645" cy="510" r="18" fill="#555"/>
  <circle cx="645" cy="510" r="7" fill="#444"/>

  <!-- Kupplungsmaul / Anhängerkupplung -->
  <rect x="375" y="495" width="50" height="15" rx="3" fill="#555"/>
  <circle cx="400" cy="502" r="6" fill="#444" stroke="#333" stroke-width="1"/>

  <!-- Schriftzug -->
  <text x="400" y="408" text-anchor="middle" fill="#fff" font-size="20" font-family="Arial" font-weight="bold" letter-spacing="2">HLF 20</text>

  <!-- Kennzeichen-Bereich -->
  <rect x="320" y="455" width="160" height="30" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="400" y="476" text-anchor="middle" fill="#222" font-size="14" font-family="monospace" font-weight="bold">FW-HLF 20</text>
</svg>