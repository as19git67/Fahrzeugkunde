  <circle cx="900" cy="410" r="38" fill="#222"/>
  <circle cx="900" cy="410" r="20" fill="#555"/>
  <circle cx="900" cy="410" r="8" fill="#444"/>
  <circle cx="900" cy="398" r="3" fill="#777"/>
