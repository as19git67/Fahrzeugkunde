<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="cabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dd1111"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="#f0f0f0"/>

  <!-- Schatten -->
  <rect x="85" y="55" width="1040" height="300" rx="10" fill="rgba(0,0,0,0.08)"/>

  <!-- Aufbau (Geräteraum von oben) -->
  <rect x="300" y="50" width="780" height="290" rx="5" fill="url(#bodyGrad)" stroke="#800" stroke-width="2"/>

  <!-- Rollladen-Deckel links (geschlossen) -->
  <rect x="305" y="55" width="770" height="12" fill="#777" stroke="#666" stroke-width="0.5"/>
  <!-- Rollladen-Deckel rechts (geschlossen) -->
  <rect x="305" y="323" width="770" height="12" fill="#777" stroke="#666" stroke-width="0.5"/>

  <!-- Dachfläche Geräteraum -->
  <rect x="305" y="70" width="770" height="250" rx="2" fill="#aa0000" stroke="#880000" stroke-width="1"/>

  <!-- Leiter auf Dach -->
  <rect x="370" y="110" width="640" height="8" rx="2" fill="#999" stroke="#777" stroke-width="1"/>
  <rect x="370" y="272" width="640" height="8" rx="2" fill="#999" stroke="#777" stroke-width="1"/>
  <!-- Leitersprossen -->
  <rect x="400" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="460" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="520" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="580" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="640" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="700" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="760" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="820" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="880" y="112" width="6" height="166" rx="1" fill="#888"/>
  <rect x="940" y="112" width="6" height="166" rx="1" fill="#888"/>

  <!-- Kabine von oben -->
  <rect x="70" y="65" width="230" height="260" rx="8" fill="url(#cabGrad)" stroke="#800" stroke-width="2"/>

  <!-- Dach Kabine -->
  <rect x="80" y="75" width="210" height="240" rx="5" fill="#bb0000"/>

  <!-- Lichtbalken -->
  <rect x="100" y="90" width="170" height="35" rx="8" fill="#333" stroke="#222" stroke-width="1"/>
  <rect x="110" y="95" width="35" height="25" rx="5" fill="#4488ff" opacity="0.9"/>
  <rect x="150" y="95" width="35" height="25" rx="5" fill="#4488ff" opacity="0.9"/>
  <rect x="195" y="95" width="35" height="25" rx="5" fill="#ff4444" opacity="0.9"/>
  <rect x="235" y="95" width="25" height="25" rx="5" fill="#ff4444" opacity="0.9"/>

  <!-- Windschutzscheibe (von oben sichtbar) -->
  <rect x="73" y="140" width="20" height="110" rx="3" fill="#b8d4e8" opacity="0.5"/>

  <!-- Spiegel links -->
  <rect x="60" y="145" width="15" height="30" rx="3" fill="#444"/>
  <!-- Spiegel rechts -->
  <rect x="60" y="215" width="15" height="30" rx="3" fill="#444"/>

  <!-- Reifen vorne links -->
  <rect x="72" y="55" width="18" height="40" rx="5" fill="#222"/>
  <!-- Reifen vorne rechts -->
  <rect x="72" y="295" width="18" height="40" rx="5" fill="#222"/>

  <!-- Reifen hinten links -->
  <rect x="890" y="45" width="22" height="48" rx="5" fill="#222"/>
  <!-- Reifen hinten rechts -->
  <rect x="890" y="297" width="22" height="48" rx="5" fill="#222"/>

  <!-- Geräteraum-Klappen Markierungen -->
  <line x1="480" y1="70" x2="480" y2="320" stroke="#880000" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="650" y1="70" x2="650" y2="320" stroke="#880000" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="820" y1="70" x2="820" y2="320" stroke="#880000" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Beschriftungen der Geräteraum-Sektionen -->
  <text x="390" y="30" text-anchor="middle" fill="#666" font-size="11" font-family="Arial">G1/G5</text>
  <text x="565" y="30" text-anchor="middle" fill="#666" font-size="11" font-family="Arial">G2/G6</text>
  <text x="735" y="30" text-anchor="middle" fill="#666" font-size="11" font-family="Arial">G3/G7</text>
  <text x="920" y="30" text-anchor="middle" fill="#666" font-size="11" font-family="Arial">G4/G8</text>

  <!-- Links/Rechts Labels -->
  <text x="390" y="385" text-anchor="middle" fill="#999" font-size="10" font-family="Arial">← Links</text>
  <text x="390" y="15" text-anchor="middle" fill="#999" font-size="10" font-family="Arial">Rechts →</text>

  <!-- Heck-Markierung -->
  <rect x="1080" y="65" width="5" height="260" fill="#ffcc00" opacity="0.7"/>

  <!-- Schriftzug -->
  <text x="700" y="205" text-anchor="middle" fill="#fff" font-size="16" font-family="Arial" font-weight="bold" opacity="0.6">HLF 20</text>

  <!-- Vorne/Hinten Labels -->
  <text x="55" y="200" text-anchor="middle" fill="#999" font-size="10" font-family="Arial" transform="rotate(-90, 55, 200)">VORNE</text>
  <text x="1100" y="200" text-anchor="middle" fill="#999" font-size="10" font-family="Arial" transform="rotate(-90, 1100, 200)">HINTEN</text>
</svg>