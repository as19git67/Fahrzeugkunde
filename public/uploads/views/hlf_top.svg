<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="HLF 20 Ansicht Dach">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f7f1e1" />
      <stop offset="100%" stop-color="#e8dfc3" />
    </radialGradient>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="270" />
      <feDisplacementMap in="SourceGraphic" scale="1.8" />
    </filter>
    <filter id="sketchLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" seed="273" />
      <feDisplacementMap in="SourceGraphic" scale="1.1" />
    </filter>
  </defs>

  <rect width="800" height="380" fill="url(#paper)" />

  <g fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" filter="url(#sketchLight)">
    <rect x="10" y="10" width="780" height="360" stroke-width="2.4" rx="6" />
    <rect x="16" y="16" width="768" height="348" stroke-width="1.2" rx="4" />
  </g>

  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18" filter="url(#sketchLight)">
    <line x1="40" y1="340" x2="120" y2="340" />
    <line x1="40" y1="348" x2="140" y2="348" />
    <line x1="640" y1="340" x2="760" y2="340" />
    <line x1="680" y1="348" x2="760" y2="348" />
  </g>

  <g filter="url(#sketch)">
    
    <!-- Umriss Gesamtfahrzeug -->
    <rect x="60" y="90" width="680" height="200" fill="#d83a2a" stroke="#1a1a1a" stroke-width="3" rx="6" />

    <!-- Kabinenbereich (vorn = links), etwas dunkler -->
    <rect x="60" y="90" width="190" height="200" fill="#c02a1a" stroke="#1a1a1a" stroke-width="3" rx="6" />

    <!-- Windschutzscheibe (Kabinen-Front) -->
    <path d="M 64 140 L 110 104 L 200 104 L 200 176 L 64 176 Z"
          fill="#b8d8f0" stroke="#1a1a1a" stroke-width="2.4" stroke-linejoin="round" />
    <line x1="132" y1="104" x2="132" y2="176" stroke="#1a1a1a" stroke-width="1.6" />

    <!-- Blaulichtbalken quer auf Kabinen-Dach -->
    <rect x="210" y="122" width="32" height="136" rx="4" fill="#3aa0ff" stroke="#1a1a1a" stroke-width="2.4" />
    <line x1="210" y1="150" x2="242" y2="150" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="210" y1="176" x2="242" y2="176" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="210" y1="202" x2="242" y2="202" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="210" y1="228" x2="242" y2="228" stroke="#1a1a1a" stroke-width="1.2" />

    <!-- Trennkante Kabine/Aufbau -->
    <line x1="250" y1="90" x2="250" y2="290" stroke="#1a1a1a" stroke-width="2.6" />

    <!-- Aufbau-Dach: Leitern längs (zwei Leitern nebeneinander) -->
    
    <g stroke="#1a1a1a" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
      <rect x="268" y="118" width="430" height="38" fill="#e0d3a8" />
      <line x1="268" y1="124" x2="698" y2="124" stroke-width="1.6" />
      <line x1="268" y1="150" x2="698" y2="150" stroke-width="1.6" />
      <line x1="294" y1="121" x2="294" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="320" y1="121" x2="320" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="346" y1="121" x2="346" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="372" y1="121" x2="372" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="398" y1="121" x2="398" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="424" y1="121" x2="424" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="450" y1="121" x2="450" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="476" y1="121" x2="476" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="502" y1="121" x2="502" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="528" y1="121" x2="528" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="554" y1="121" x2="554" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="580" y1="121" x2="580" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="606" y1="121" x2="606" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="632" y1="121" x2="632" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="658" y1="121" x2="658" y2="153" stroke="#1a1a1a" stroke-width="1.4" /><line x1="684" y1="121" x2="684" y2="153" stroke="#1a1a1a" stroke-width="1.4" />
    </g>
  
    
    <g stroke="#1a1a1a" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
      <rect x="268" y="170" width="430" height="38" fill="#e0d3a8" />
      <line x1="268" y1="176" x2="698" y2="176" stroke-width="1.6" />
      <line x1="268" y1="202" x2="698" y2="202" stroke-width="1.6" />
      <line x1="294" y1="173" x2="294" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="320" y1="173" x2="320" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="346" y1="173" x2="346" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="372" y1="173" x2="372" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="398" y1="173" x2="398" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="424" y1="173" x2="424" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="450" y1="173" x2="450" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="476" y1="173" x2="476" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="502" y1="173" x2="502" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="528" y1="173" x2="528" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="554" y1="173" x2="554" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="580" y1="173" x2="580" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="606" y1="173" x2="606" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="632" y1="173" x2="632" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="658" y1="173" x2="658" y2="205" stroke="#1a1a1a" stroke-width="1.4" /><line x1="684" y1="173" x2="684" y2="205" stroke="#1a1a1a" stroke-width="1.4" />
    </g>
  

    <!-- Dachkasten / Geräteraum mittig hinter den Leitern -->
    <rect x="268" y="222" width="200" height="46" fill="#e0d3a8" stroke="#1a1a1a" stroke-width="2.6" />
    <line x1="268" y1="240" x2="468" y2="240" stroke="#1a1a1a" stroke-width="1.4" />
    <line x1="318" y1="222" x2="318" y2="268" stroke="#1a1a1a" stroke-width="1.4" />
    <line x1="368" y1="222" x2="368" y2="268" stroke="#1a1a1a" stroke-width="1.4" />
    <line x1="418" y1="222" x2="418" y2="268" stroke="#1a1a1a" stroke-width="1.4" />

    <!-- Lüftergitter / Abgas Andeutung rechts vom Dachkasten -->
    <rect x="482" y="222" width="60" height="46" fill="#9a9a9a" stroke="#1a1a1a" stroke-width="2.4" />
    <line x1="492" y1="230" x2="532" y2="230" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="492" y1="240" x2="532" y2="240" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="492" y1="250" x2="532" y2="250" stroke="#1a1a1a" stroke-width="1.2" />
    <line x1="492" y1="260" x2="532" y2="260" stroke="#1a1a1a" stroke-width="1.2" />

    <!-- Lichtmast-Platz (kleines Rechteck hinten am Aufbau, nahe Kabine) -->
    <rect x="560" y="222" width="60" height="46" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2.4" />
    <circle cx="590" cy="245" r="10" fill="#3aa0ff" stroke="#1a1a1a" stroke-width="1.8" />

    <!-- Heck-Markierung (dunkler Streifen außen hinten) -->
    <rect x="720" y="90" width="20" height="200" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="2.4" />

    <!-- Umriss-Linien Aufbau-Rand (Kante-Paneel) -->
    <line x1="250" y1="110" x2="720" y2="110" stroke="#1a1a1a" stroke-width="1.6" opacity="0.6" />
    <line x1="250" y1="270" x2="720" y2="270" stroke="#1a1a1a" stroke-width="1.6" opacity="0.6" />

    <!-- Richtungs-Pfeil (vorn nach links) als Orientierungshilfe, dezent -->
    <g stroke="#1a1a1a" stroke-width="1.6" fill="none" opacity="0.55">
      <line x1="120" y1="64" x2="80" y2="64" />
      <polyline points="90,58 80,64 90,70" stroke-linejoin="round" />
      <line x1="680" y1="64" x2="720" y2="64" />
      <polyline points="710,58 720,64 710,70" stroke-linejoin="round" />
    </g>
  
  </g>
</svg>
